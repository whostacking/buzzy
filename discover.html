<style>
.page-discover .main-header {
    margin-bottom: 2rem;
}

.sun {
    position: absolute;
    width: 60%;
    height: 60%;
    
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 15px;

    z-index: 5;
    opacity: 0.3;

    img {
        width: 100%;
        height: 100%;
    }
}

/* SINGLE OUTER ORBIT */

.discover-orbiting {
    position: relative;
    width: 600px;
    height: 600px;
    margin: auto;
}

.orbit {
    position: absolute;
    inset: 0;

    border-radius: 50%;
    /* border: 2px solid rgba(0,0,0,0.18); */

    animation: orbit-spin 40s linear infinite;
    opacity: 0.15;
}

.planet {
    --radius: 300px;
    --size: 72px;

    position: absolute;

    width: var(--size);
    height: var(--size);

    top: 50%;
    left: 50%;

    margin: calc(var(--size) / -2);

    /* AUTO ANGLE */
    --angle: calc(
        (360deg / var(--total)) * var(--i)
    );

    transform:
        rotate(var(--angle))
        translateX(var(--radius))
        rotate(calc(var(--angle) * -1));

    animation: keep-upright 40s linear infinite;
}

@keyframes orbit-spin {
    from {
        transform: rotate(0deg);
    }

    to {
        transform: rotate(360deg);
    }
}

@keyframes keep-upright {
    from {
        transform:
            rotate(var(--angle))
            translateX(var(--radius))
            rotate(0deg);
    }

    to {
        transform:
            rotate(calc(var(--angle) + 360deg))
            translateX(var(--radius))
            rotate(-360deg);
    }
}

@keyframes spin {

    from {
        transform: translate(-50%, -50%) rotate(0deg);
    }

    to {
        transform: translate(-50%, -50%) rotate(360deg);
    }

}

.discover-landing {
    display: grid;

    > * {
        grid-area: 1 / 1;
    }

    .discover-orbiting {
        z-index: 0;
        pointer-events: none;
    }

    .discover-container {
        z-index: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }
}
</style>
